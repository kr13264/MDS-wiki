<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MDS Wiki Editor</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <!-- ── Sidebar ── -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>COMP. Wiki Generator</h1>
        <button id="btn-settings" class="icon-btn" title="설정">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 008.6 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 8.6a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Components</div>
        <ul id="component-list"></ul>
        <button id="btn-new-component" class="btn-secondary">+ 새 컴포넌트</button>
      </div>
    </aside>

    <!-- ── Main ── -->
    <main id="main">
      <!-- Empty state -->
      <div id="empty-state">
        <div class="empty-icon">
          <svg width="48" height="48" fill="none" stroke="#9999B8" stroke-width="1" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
        </div>
        <p>좌측에서 컴포넌트를 선택하거나 새로 만들어주세요</p>
      </div>

      <!-- Editor -->
      <div id="editor" style="display:none;">
        <div class="editor-toolbar">
          <div class="editor-tabs">
            <button class="tab active" data-tab="edit">편집</button>
            <button class="tab" data-tab="preview">미리보기</button>
          </div>
          <div class="editor-actions">
            <button id="btn-save" class="btn-primary">저장</button>
            <button id="btn-figma-publish" class="btn-figma">Figma 발행</button>
            <button id="btn-publish" class="btn-publish">Confluence 발행</button>
          </div>
        </div>

        <!-- Edit Tab -->
        <div id="tab-edit" class="tab-content">
          <div class="form-section">
            <h2>기본 정보</h2>
            <div class="form-row">
              <label>컴포넌트명</label>
              <input type="text" id="field-name" placeholder="예: Thumbnail" />
            </div>
            <div class="form-row">
              <label>설명</label>
              <input type="text" id="field-desc" placeholder="컴포넌트에 대한 한줄 설명" />
            </div>
            <div class="form-row">
              <label>Figma URL</label>
              <div style="display:flex;gap:8px;">
                <input type="text" id="field-figma-url" placeholder="https://www.figma.com/design/..." style="flex:1;" />
                <button id="btn-figma-extract" class="btn-primary" style="white-space:nowrap;">Figma에서 가져오기</button>
              </div>
            </div>
          </div>

          <!-- Anatomy -->
          <div class="form-section">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
              <h2 style="margin:0;">Measurement (Anatomy)</h2>
              <button id="btn-anatomy-edit" class="btn-secondary" style="width:auto;padding:6px 14px;">편집 모드</button>
            </div>
            <div id="anatomy-container">
              <div class="image-drop-zone" id="anatomy-image" data-field="anatomy.imageUrl">
                <div class="drop-placeholder">
                  <svg width="32" height="32" fill="none" stroke="#9999B8" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
                  <p>Anatomy 이미지를 드래그하거나 클릭해서 업로드</p>
                </div>
                <img class="drop-preview" style="display:none;" />
                <button class="drop-remove" style="display:none;">×</button>
              </div>
              <div id="anatomy-overlay" class="anatomy-overlay"></div>
            </div>

            <h3 style="margin-top:24px;">Slots</h3>
            <div id="slots-list"></div>
            <button id="btn-add-slot" class="btn-secondary">+ Slot 추가</button>
          </div>

          <!-- Properties -->
          <div class="form-section">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
              <h2 style="margin:0;">Properties</h2>
              <button id="btn-toggle-edit" class="btn-secondary" style="width:auto;padding:6px 14px;">편집 모드</button>
            </div>
            <div id="properties-list"></div>
            <div id="properties-edit-actions" style="display:none;">
              <button id="btn-add-property" class="btn-secondary">+ Property 추가</button>
            </div>
          </div>
        </div>

        <!-- Preview Tab -->
        <div id="tab-preview" class="tab-content" style="display:none;">
          <iframe id="preview-frame" style="width:100%;height:calc(100vh - 120px);border:none;background:#fff;border-radius:36px;"></iframe>
        </div>
      </div>
    </main>

    <!-- ── Settings Modal ── -->
    <div id="modal-settings" class="modal" style="display:none;">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <h2>설정</h2>
        <h3 style="font-size:14px;color:#55557A;margin-bottom:12px;">Figma</h3>
        <div class="form-row">
          <label>Figma Personal Access Token</label>
          <input type="password" id="cfg-figma-token" placeholder="figd_..." />
        </div>
        <hr style="border:none;border-top:1px solid #E4E4EE;margin:20px 0;" />
        <h3 style="font-size:14px;color:#55557A;margin-bottom:12px;">Confluence</h3>
        <div class="form-row">
          <label>Base URL</label>
          <input type="text" id="cfg-base-url" placeholder="https://wiki.navercorp.com" />
        </div>
        <div class="form-row">
          <label>Space Key</label>
          <input type="text" id="cfg-space-key" placeholder="NAVCOUX" />
        </div>
        <div class="form-row">
          <label>Parent Page ID</label>
          <input type="text" id="cfg-parent-page" placeholder="3983063993" />
        </div>
        <div class="form-row">
          <label>사용자명 (ID)</label>
          <input type="text" id="cfg-confluence-user" placeholder="user.name" />
        </div>
        <div class="form-row">
          <label>비밀번호 / API Token</label>
          <input type="password" id="cfg-token" placeholder="비밀번호 또는 API 토큰" />
        </div>
        <div class="modal-actions">
          <button id="btn-cfg-cancel" class="btn-secondary">취소</button>
          <button id="btn-cfg-save" class="btn-primary">저장</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
